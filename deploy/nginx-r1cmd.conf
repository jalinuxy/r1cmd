# Serve the install script at https://jalinuxy.ir/r1cmd
#
# 1. Copy install.sh to the server:
#      scp install.sh user@jalinuxy.ir:/var/www/jalinuxy/r1cmd/install.sh
#
# 2. Include this file from your main nginx site config, e.g.:
#      include /etc/nginx/snippets/r1cmd.conf;
#
# 3. Reload nginx:
#      sudo nginx -t && sudo systemctl reload nginx
#
# Users can then run:
#      curl -fsSL https://jalinuxy.ir/r1cmd | sh

location = /r1cmd {
    alias /var/www/jalinuxy/r1cmd/install.sh;
    default_type text/plain;
    charset utf-8;

    # Allow curl | sh from any origin
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=300" always;
}

# Optional: pin a specific version via query string is handled by install.sh env:
#   curl -fsSL https://jalinuxy.ir/r1cmd | R1CMD_VERSION=0.2.0 sh
